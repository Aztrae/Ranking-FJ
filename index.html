<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Salón de la Fama - Astrae</title>
    <style>
        :root { --fondo: #0b1120; --panel: #162032; --panel-light: #1e293b; --oro: #fbbf24; --plata: #cbd5e1; --bronce: #b45309; --vic: #3b82f6; --der: #ef4444; --heal: #10b981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: white; padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .main { width: 100%; max-width: 1400px; background: var(--panel); padding: 25px; border-radius: 20px; border: 1px solid #334155; box-shadow: 0 15px 40px rgba(0,0,0,0.6); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; justify-content: center; }
        .tab-btn { background: #334155; color: #94a3b8; padding: 12px 25px; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; text-transform: uppercase; transition: 0.3s; font-size: 1.1em; }
        .tab-btn.active { background: #475569; color: white; border-bottom: 3px solid var(--oro); box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2); }
        .content { display: none; } .content.active { display: block; animation: fadeIn 0.4s ease; }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; margin-top: 10px; }
        th { text-align: left; color: var(--oro); padding: 15px; background: rgba(0,0,0,0.4); text-transform: uppercase; font-size: 0.85em; letter-spacing: 1px; }
        td { padding: 15px; background: var(--panel-light); vertical-align: middle; border-top: 1px solid #334155; border-bottom: 1px solid #334155; }
        td:first-child { border-left: 1px solid #334155; border-radius: 10px 0 0 10px; }
        td:last-child { border-right: 1px solid #334155; border-radius: 0 10px 10px 0; }
        
        .rank-1 td { background: linear-gradient(90deg, rgba(251, 191, 36, 0.15) 0%, var(--panel-light) 100%); border-color: rgba(251, 191, 36, 0.5); }
        .rank-2 td { background: linear-gradient(90deg, rgba(203, 213, 225, 0.1) 0%, var(--panel-light) 100%); border-color: rgba(203, 213, 225, 0.4); }
        .rank-3 td { background: linear-gradient(90deg, rgba(180, 83, 9, 0.15) 0%, var(--panel-light) 100%); border-color: rgba(180, 83, 9, 0.4); }
        .crown { font-size: 1.8em; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }

        .score-badge { display: inline-block; background: linear-gradient(45deg, #fbbf24, #f59e0b); color: black; font-weight: 900; padding: 6px 12px; border-radius: 8px; font-size: 1.1em; margin-top: 5px; box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3); }
        .stat-block { display: flex; flex-direction: column; gap: 4px; font-size: 0.9em; }
        .mvp-icon { font-size: 1.2em; vertical-align: middle; margin-left: 4px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        
        .header-title { text-align: center; margin-bottom: 30px; }
        .header-title h1 { color: var(--oro); font-size: 2.5em; margin: 0; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 20px rgba(251, 191, 36, 0.3); }
        .header-title p { color: #94a3b8; font-size: 1.1em; margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main">
    <div class="header-title">
        <h1>Salón de la Fama - Astrae</h1>
        <p>Ranking oficial actualizado en tiempo real</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="tab('r'); renderTable('temporada');">🏆 Liga Actual</button>
        <button class="tab-btn" onclick="tab('p'); renderTable('permanente');" style="color: var(--oro);">👑 Histórico Permanente</button>
    </div>

    <div id="r" class="content active">
        <table>
            <thead><tr><th style="width: 50px; text-align: center;">Rnk</th><th>Entrenador</th><th>Win Rate</th><th>K | A | I</th><th>Desempeño (Tot / Avg)</th></tr></thead>
            <tbody id="rTable"><tr><td colspan="5" style="text-align: center;">Sincronizando con los servidores de Firebase... 🔥</td></tr></tbody>
        </table>
    </div>

    <div id="p" class="content">
        <table>
            <thead><tr><th style="width: 50px; text-align: center;">Rnk</th><th>Entrenador Leyenda</th><th>Win Rate</th><th>K | A | I (Promedios)</th><th>Desempeño Global</th></tr></thead>
            <tbody id="pTable"></tbody>
        </table>
    </div>
</div>

<script>
    // --- CONEXIÓN DIRECTA A TU FIREBASE ---
    const FIREBASE_URL = 'https://ranking-fj-cb29e-default-rtdb.firebaseio.com'; 
    let dataNube = { temporada: {}, permanente: {} };

    function tab(id) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function procesarRanking(bdObj) {
        if (!bdObj) return [];
        const ranking = Object.keys(bdObj).map(n => {
            const p = bdObj[n]; const numP = p.p || 1;
            const wr = (p.vic / numP) * 100;
            const perfScore = ((p.k/numP)*2) + ((p.a/numP)*1.5) + (((p.i_stats||0)/numP)*1) + (((p.pts_tot||0)/numP)/10) + (((p.d_tot/numP)/1000)*1) + (((p.rec_tot||0)/numP)/1000*0.8) + (((p.cur_tot||0)/numP)/1000*1.2);
            let final100Score = Math.min(100, ((perfScore * (1 + (wr / 100))) / 300) * 100);

            return { 
                nombre: n, ...p, score: parseFloat(final100Score.toFixed(1)), wr: wr.toFixed(1),
                avgInf: parseFloat(((p.d_tot/numP)/1000).toFixed(1)), avgRec: parseFloat(((p.rec_tot||0)/numP/1000).toFixed(1)), avgCur: parseFloat(((p.cur_tot||0)/numP/1000).toFixed(1))
            };
        });
        return ranking.sort((a, b) => b.score - a.score);
    }

    async function fetchNube() {
        try {
            const res = await fetch(`${FIREBASE_URL}/ranking.json`);
            if (!res.ok) throw new Error("Error en la respuesta de red");
            const data = await res.json();
            if (data) {
                dataNube = data;
                renderTable('temporada'); 
            }
        } catch (e) {
            document.getElementById('rTable').innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">Error conectando a Firebase 🔥📡</td></tr>`;
        }
    }

    function renderTable(tipo) {
        const bd = tipo === 'permanente' ? dataNube.permanente : dataNube.temporada;
        if (!bd) return;
        const data = procesarRanking(bd);
        const isPerm = tipo === 'permanente';
        
        const maxInf = data.length > 0 ? Math.max(...data.map(d => d.avgInf)) : 0;
        const maxRec = data.length > 0 ? Math.max(...data.map(d => d.avgRec)) : 0;
        const maxCur = data.length > 0 ? Math.max(...data.map(d => d.avgCur)) : 0;

        const html = data.map((j, i) => {
            let rankDisplay = `<b style="font-size:1.3em; color:var(--plata)">#${i+1}</b>`;
            let rowClass = "";
            if (i === 0) { rankDisplay = `<span class="crown" title="Campeón">👑</span>`; rowClass = "rank-1"; }
            else if (i === 1) { rankDisplay = `<span class="crown" title="Subcampeón">🥈</span>`; rowClass = "rank-2"; }
            else if (i === 2) { rankDisplay = `<span class="crown" title="Tercer Lugar">🥉</span>`; rowClass = "rank-3"; }

            const isDmgMVP = j.avgInf === maxInf && j.avgInf > 0 ? `<span class="mvp-icon" title="Mayor Daño Promedio">💥</span>` : "";
            const isTankMVP = j.avgRec === maxRec && j.avgRec > 0 ? `<span class="mvp-icon" title="Mayor Tanqueo Promedio">🛡️</span>` : "";
            const isHealMVP = j.avgCur === maxCur && j.avgCur > 0 ? `<span class="mvp-icon" title="Mayor Curación Promedio">💚</span>` : "";

            const colKAI = isPerm 
                ? `<td style="font-size:0.95em; line-height: 1.6;"><b style="color:#f87171">Avg K:</b> ${(j.k / (j.p || 1)).toFixed(1)}<br><b style="color:#60a5fa">Avg A:</b> ${(j.a / (j.p || 1)).toFixed(1)}<br><b style="color:#fcd34d">Avg I:</b> ${((j.i_stats || 0) / (j.p || 1)).toFixed(1)}</td>`
                : `<td style="font-size:0.95em; line-height: 1.6;"><b style="color:#f87171">Kills:</b> ${j.k}<br><b style="color:#60a5fa">Assists:</b> ${j.a}<br><b style="color:#fcd34d">Interrup:</b> ${j.i_stats || 0}</td>`;

            return `<tr class="${rowClass}">
                <td style="text-align: center;">${rankDisplay}</td>
                <td><b style="font-size:1.15em; letter-spacing: 0.5px;">${j.nombre}</b><br><span class="score-badge">⚡ ${j.score}</span></td>
                <td><b style="color:var(--vic); font-size:1.2em">${j.wr}%</b><br><small style="color:#94a3b8; text-transform: uppercase; font-weight: bold;">${j.p} Partidas</small></td>
                ${colKAI}
                <td><div class="stat-block">
                    <span style="color:#fca5a5;">⚔️ ${(j.d_tot/1000).toFixed(1)}k <small style="color:#94a3b8">(Avg: ${j.avgInf}k)</small>${isDmgMVP}</span>
                    <span style="color:#93c5fd;">🛡️ ${(j.rec_tot/1000).toFixed(1)}k <small style="color:#94a3b8">(Avg: ${j.avgRec}k)</small>${isTankMVP}</span>
                    <span style="color:#6ee7b7;">💚 ${(j.cur_tot/1000).toFixed(1)}k <small style="color:#94a3b8">(Avg: ${j.avgCur}k)</small>${isHealMVP}</span>
                </div></td>
            </tr>`;
        });
        
        const targetBody = isPerm ? 'pTable' : 'rTable';
        document.getElementById(targetBody).innerHTML = html.join('');
    }

    // Actualización cada 30 segundos usando el ancho de banda masivo de Firebase
    fetchNube();
    setInterval(fetchNube, 30000); 
</script>
</body>
</html>
